server {
    listen 80;
    listen [::]:80;
    server_name zhongkezhiyan.cn www.zhongkezhiyan.cn;

    root /var/www/zenk-preview;
    index index.html;

    charset utf-8;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /api/nav-config {
        proxy_pass http://127.0.0.1:8787/api/nav-config;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    location = /nav-config.json {
        expires -1;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }
}
