server {
    listen 80;
    listen [::]:80;
    server_name zhongkezhiyan.cn www.zhongkezhiyan.cn;

    root /var/www/zenk-preview;
    index index.html;

    charset utf-8;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }
}
